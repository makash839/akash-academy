<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Monk Mode System</title>
<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    text-align:center;
    padding:20px;
}
.card{
    background:#1e293b;
    padding:20px;
    border-radius:15px;
    margin:15px auto;
    max-width:400px;
}
button{
    padding:10px 20px;
    margin:5px;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}
.primary{background:#6366f1;color:white;}
.danger{background:#ef4444;color:white;}
.success{background:#10b981;color:white;}
.progress{
    height:20px;
    background:#334155;
    border-radius:10px;
    overflow:hidden;
}
.progress-fill{
    height:100%;
    background:linear-gradient(90deg,#6366f1,#8b5cf6);
}
</style>
</head>
<body>

<h1>🧘 Monk Mode System</h1>

<div class="card">
    <h2 id="streak">Streak: 0 Days</h2>
    <h3 id="level">Level: Beginner</h3>

    <div class="progress">
        <div class="progress-fill" id="progressBar"></div>
    </div>
</div>

<div class="card">
    <h3>Daily Meditation (1 Hour)</h3>
    <button class="success" onclick="completeMeditation()">✔ Completed</button>
</div>

<div class="card">
    <button class="danger" onclick="relapse()">❌ Relapse</button>
</div>

<script>
let data = JSON.parse(localStorage.getItem("monkData")) || {
    streak:0,
    lastDate:null,
    meditationDates:[]
};

const levels = [
    {days:30,name:"Recover Man"},
    {days:60,name:"Return to Self"},
    {days:90,name:"Super Discipline"},
    {days:120,name:"Gamma Focus"},
    {days:180,name:"Deep Control"},
    {days:270,name:"Warrior Monk"},
    {days:365,name:"Monk"},
    {days:730,name:"Super Monk"}
];

function updateUI(){
    document.getElementById("streak").innerText="Streak: "+data.streak+" Days";

    let currentLevel="Beginner";
    levels.forEach(l=>{
        if(data.streak>=l.days){
            currentLevel=l.name;
        }
    });
    document.getElementById("level").innerText="Level: "+currentLevel;

    let nextLevel = levels.find(l=>data.streak<l.days);
    let percent=0;
    if(nextLevel){
        percent=(data.streak/nextLevel.days)*100;
    }else{
        percent=100;
    }
    document.getElementById("progressBar").style.width=percent+"%";

    localStorage.setItem("monkData",JSON.stringify(data));
}

function completeMeditation(){
    let today=new Date().toDateString();

    if(data.lastDate!==today){
        data.streak++;
        data.lastDate=today;
        data.meditationDates.push(today);
        alert("🔥 Discipline Day Completed!");
    }else{
        alert("Already completed today!");
    }

    updateUI();
}

function relapse(){
    if(confirm("Are you sure? Streak will reset.")){
        data.streak=0;
        data.lastDate=null;
        data.meditationDates=[];
        updateUI();
    }
}

updateUI();
</script>

</body>
</html>  </div>
</div>

<script>
// ===== DATA =====
let goals = [];
let progress = {};
const PASS_KEY = 'goalPass';
const GOALS_KEY = 'lifeGoals';
const PROG_KEY = 'dailyProg';

// ===== PASSWORD =====
function checkFirst() {
  if (!localStorage.getItem(PASS_KEY)) {
    document.getElementById('loginSection').classList.add('hidden');
    document.getElementById('setupSection').classList.remove('hidden');
  }
}

function setupPassword() {
  const p1 = document.getElementById('newPassword').value;
  const p2 = document.getElementById('confirmPassword').value;
  if (p1.length < 4) return alert('❌ Min 4 characters!');
  if (p1 !== p2) return alert('❌ Password match नहीं!');
  localStorage.setItem(PASS_KEY, btoa(p1));
  alert('✅ Password set!');
  location.reload();
}

function checkPassword() {
  const input = document.getElementById('passwordInput').value;
  if (btoa(input) === localStorage.getItem(PASS_KEY)) {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('mainApp').classList.remove('hidden');
    initApp();
  } else {
    document.getElementById('errorMsg').classList.remove('hidden');
    document.getElementById('passwordInput').classList.add('shake');
    setTimeout(() => document.getElementById('passwordInput').classList.remove('shake'), 500);
  }
}

function changePass() {
  const old = document.getElementById('oldPass').value;
  const newP = document.getElementById('newPass').value;
  if (btoa(old) !== localStorage.getItem(PASS_KEY)) return alert('❌ पुराना Password गलत!');
  if (newP.length < 4) return alert('❌ Min 4 characters!');
  localStorage.setItem(PASS_KEY, btoa(newP));
  alert('✅ Password changed!');
  closeSettings();
}

function logout() {
  document.getElementById('mainApp').classList.add('hidden');
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('passwordInput').value = '';
  closeSettings();
}

// ===== SETTINGS =====
function openSettings() { document.getElementById('settingsModal').classList.remove('hidden'); }
function closeSettings() { document.getElementById('settingsModal').classList.add('hidden'); }

function resetAll() {
  if (confirm('⚠️ सारा Data delete?') && confirm('⚠️ Last Warning!')) {
    localStorage.removeItem(GOALS_KEY);
    localStorage.removeItem(PROG_KEY);
    alert('✅ Deleted!');
    location.reload();
  }
}

// ===== MAIN APP =====
function initApp() {
  goals = JSON.parse(localStorage.getItem(GOALS_KEY)) || [];
  progress = JSON.parse(localStorage.getItem(PROG_KEY)) || {};
  document.getElementById('currentDate').textContent = new Date().toLocaleDateString('hi-IN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  render();
}

function save() {
  localStorage.setItem(GOALS_KEY, JSON.stringify(goals));
  localStorage.setItem(PROG_KEY, JSON.stringify(progress));
}

// ===== GOALS =====
function openAddGoal() { document.getElementById('addGoalModal').classList.remove('hidden'); }
function closeAddGoal() { 
  document.getElementById('addGoalModal').classList.add('hidden'); 
  document.getElementById('goalName').value = '';
  document.getElementById('goalTarget').value = '';
  document.getElementById('goalUnit').value = '';
}

function saveGoal() {
  const name = document.getElementById('goalName').value.trim();
  const target = parseInt(document.getElementById('goalTarget').value);
  const unit = document.getElementById('goalUnit').value.trim() || 'units';
  if (!name || !target) return alert('❌ सही details भरो!');
  goals.push({ id: Date.now(), name, target, unit, current: 0, start: new Date().toISOString() });
  save();
  closeAddGoal();
  render();
  alert('✅ Goal added!');
}

function deleteGoal(id) {
  if (!confirm('⚠️ Delete करना है?')) return;
  goals = goals.filter(g => g.id !== id);
  Object.keys(progress).forEach(d => {
    progress[d] = progress[d].filter(p => p.gid !== id);
    if (!progress[d].length) delete progress[d];
  });
  save();
  render();
}

function getLast7(gid) {
  const arr = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const key = d.toDateString();
    const sum = (progress[key] || []).filter(p => p.gid === gid).reduce((a, p) => a + p.qty, 0);
    arr.push(sum);
  }
  return arr;
}

function renderGoals() {
  const c = document.getElementById('goalsList');
  if (!goals.length) {
    c.innerHTML = '<div class="text-center py-8"><div class="text-5xl mb-3">🎯</div><p class="text-gray-600">कोई Goal नहीं! New Goal add करो</p></div>';
    return;
  }
  c.innerHTML = goals.map(g => {
    const pct = Math.min(100, (g.current / g.target * 100)).toFixed(1);
    const rem = Math.max(0, g.target - g.current);
    const last7 = getLast7(g.id);
    const avg = (last7.reduce((a, b) => a + b, 0) / 7).toFixed(1);
    const days = avg > 0 ? Math.ceil(rem / avg) : '--';
    const date = new Date(); if (days !== '--') date.setDate(date.getDate() + parseInt(days));
    
    let speedClass = 'speed-normal', speedTxt = 'Normal';
    const idealDaily = g.target / 180;
    if (avg < idealDaily * 0.5) { speedClass = 'speed-slow'; speedTxt = 'Slow ⚠️'; }
    else if (avg > idealDaily * 1.5) { speedClass = 'speed-fast'; speedTxt = 'Fast 🚀'; }
    
    return `
      <div class="bg-gradient-to-r from-purple-50 to-pink-50 rounded-2xl p-5">
        <div class="flex justify-between items-start mb-3">
          <div>
            <h4 class="text-xl font-bold text-purple-900">${g.name}</h4>
            <div class="text-3xl font-bold text-purple-600">${g.current} / ${g.target} <span class="text-base text-gray-600">${g.unit}</span></div>
            <div class="text-gray-600">${rem} ${g.unit} बाकी</div>
          </div>
          <div class="text-right">
            <span class="speed-badge ${speedClass}">${speedTxt}</span>
            <button onclick="deleteGoal(${g.id})" class="ml-2 text-red-500 hover:text-red-700"><i class="fas fa-trash"></i></button>
          </div>
        </div>
        <div class="w-full bg-gray-200 rounded-full h-3 mb-3">
          <div class="bg-gradient-to-r from-purple-600 to-pink-600 h-3 rounded-full" style="width:${pct}%"></div>
        </div>
        <div class="text-center text-sm font-semibold text-purple-600 mb-3">${pct}% Complete</div>
        <div class="grid grid-cols-3 gap-3 bg-white rounded-xl p-3 text-center text-sm">
          <div><div class="text-gray-500">7-Day Avg</div><div class="text-lg font-bold text-blue-600">${avg}</div></div>
          <div><div class="text-gray-500">Days Left</div><div class="text-lg font-bold text-orange-600">${days}</div></div>
          <div><div class="text-gray-500">Complete On</div><div class="font-bold text-green-600">${days !== '--' ? date.toLocaleDateString('hi-IN', {day:'numeric',month:'short'}) : '--'}</div></div>
        </div>
      </div>`;
  }).join('');
}

// ===== PROGRESS =====
function updateSelect() {
  document.getElementById('selectGoal').innerHTML = '<option value="">Goal Select करो</option>' + goals.map(g => `<option value="${g.id}">${g.name}</option>`).join('');
}

function addProgress() {
  const gid = parseInt(document.getElementById('selectGoal').value);
  const qty = parseInt(document.getElementById('todayQty').value);
  if (!gid || !qty || qty <= 0) return alert('❌ Goal select करो और quantity भरो!');
  
  const today = new Date().toDateString();
  const goal = goals.find(g => g.id === gid);
  if (!progress[today]) progress[today] = [];
  progress[today].push({ gid, name: goal.name, qty, time: new Date().toLocaleTimeString('hi-IN', {hour:'2-digit',minute:'2-digit'}) });
  goal.current += qty;
  
  save();
  document.getElementById('todayQty').value = '';
  render();
  alert('✅ Progress added!');
}

function delProg(idx) {
  const today = new Date().toDateString();
  const e = progress[today][idx];
  const g = goals.find(x => x.id === e.gid);
  if (g) g.current -= e.qty;
  progress[today].splice(idx, 1);
  if (!progress[today].length) delete progress[today];
  save();
  render();
}

function renderToday() {
  const today = new Date().toDateString();
  const list = progress[today] || [];
  const c = document.getElementById('todayList');
  if (!list.length) {
    c.innerHTML = '<div class="text-center py-6"><div class="text-4xl mb-2">📝</div><p class="text-gray-600">आज अभी कुछ नहीं किया!</p></div>';
    return;
  }
  c.innerHTML = list.map((e, i) => `
    <div class="flex items-center justify-between bg-white rounded-xl p-4 border-2 border-green-200">
      <div class="flex items-center gap-3">
        <div class="text-2xl">✅</div>
        <div><div class="font-semibold">${e.name}</div><div class="text-sm text-gray-500">${e.qty} at ${e.time}</div></div>
      </div>
      <button onclick="delProg(${i})" class="text-red-500 hover:text-red-700"><i class="fas fa-trash"></i></button>
    </div>
  `).join('');
}

function updateStats() {
  const today = new Date().toDateString();
  let streak = 0, check = new Date();
  while (true) {
    const key = check.toDateString();
    if (progress[key]?.length) { streak++; check.setDate(check.getDate() - 1); }
    else if (key === today) { check.setDate(check.getDate() - 1); }
    else break;
  }
  document.getElementById('streak').textContent = streak;
  
  const allP = Object.values(progress).flat();
  const days = Object.keys(progress).length || 1;
  document.getElementById('avgSpeed').textContent = (allP.reduce((a, p) => a + p.qty, 0) / days).toFixed(1);
  
  const dailyTotals = Object.values(progress).map(d => d.reduce((a, p) => a + p.qty, 0));
  document.getElementById('bestDay').textContent = dailyTotals.length ? Math.max(...dailyTotals) : 0;
  document.getElementById('totalDays').textContent = Object.keys(progress).length;
}

// ===== TABS =====
function switchTab(t) {
  document.querySelectorAll('.tab-content').forEach(e => e.classList.add('hidden'));
  document.querySelectorAll('[id^="tab"]').forEach(e => e.classList.remove('tab-active'));
  document.getElementById(t + 'Tab').classList.remove('hidden');
  document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1)).classList.add('tab-active');
  if (t === 'analytics') renderAnalytics();
  if (t === 'history') renderHistory();
}

let chart = null;
function renderAnalytics() {
  if (!goals.length) { document.getElementById('analyticsData').innerHTML = '<p class="text-center text-gray-600 py-6">पहले Goals add करो!</p>'; return; }
  
  const labels = [];
  for (let i = 13; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    labels.push(d.toLocaleDateString('hi-IN', {day:'numeric',month:'short'}));
  }
  
  const colors = ['#667eea','#f093fb','#4facfe','#43e97b','#fa709a'];
  const datasets = goals.map((g, idx) => {
    const data = [];
    for (let i = 13; i >= 0; i--) {
      const d = new Date(); d.setDate(d.getDate() - i);
      data.push((progress[d.toDateString()] || []).filter(p => p.gid === g.id).reduce((a, p) => a + p.qty, 0));
    }
    return { label: g.name, data, borderColor: colors[idx % 5], backgroundColor: colors[idx % 5] + '20', tension: 0.4, borderWidth: 3 };
  });
  
  const ctx = document.getElementById('chart').getContext('2d');
  if (chart) chart.destroy();
  chart = new Chart(ctx, { type: 'line', data: { labels, datasets }, options: { responsive: true, scales: { y: { beginAtZero: true } } } });
  
  document.getElementById('analyticsData').innerHTML = goals.map(g => {
    const last7 = getLast7(g.id);
    const avg = (last7.reduce((a, b) => a + b, 0) / 7).toFixed(1);
    const consistency = (last7.filter(x => x > 0).length / 7 * 100).toFixed(0);
    return `
      <div class="bg-gray-50 rounded-xl p-4">
        <h4 class="font-bold text-lg mb-2">${g.name}</h4>
        <div class="grid grid-cols-3 gap-4 text-center">
          <div><div class="text-sm text-gray-500">7-Day Avg</div><div class="text-xl font-bold text-purple-600">${avg}</div></div>
          <div><div class="text-sm text-gray-500">Best</div><div class="text-xl font-bold text-green-600">${Math.max(...last7)}</div></div>
          <div><div class="text-sm text-gray-500">Consistency</div><div class="text-xl font-bold text-blue-600">${consistency}%</div></div>
        </div>
      </div>`;
  }).join('');
}

function renderHistory() {
  const dates = Object.keys(progress).sort().reverse();
  const c = document.getElementById('historyList');
  if (!dates.length) { c.innerHTML = '<p class="text-center text-gray-600 py-6">कोई history नहीं!</p>'; return; }
  c.innerHTML = dates.map(d => {
    const list = progress[d];
    const total = list.reduce((a, p) => a + p.qty, 0);
    return `
      <div class="bg-white rounded-xl p-4 border-2 border-gray-200">
        <div class="flex justify-between items-center mb-2">
          <div class="font-bold text-gray-800">${new Date(d).toLocaleDateString('hi-IN', {weekday:'long',day:'numeric',month:'long'})}</div>
          <div class="text-xl font-bold text-purple-600">Total: ${total}</div>
        </div>
        <div class="space-y-1">${list.map(e => `<div class="flex justify-between text-sm bg-gray-50 rounded p-2"><span>${e.name}</span><span class="font-semibold text-purple-600">${e.qty}</span></div>`).join('')}</div>
      </div>`;
  }).join('');
}

function render() {
  renderGoals();
  updateSelect();
  renderToday();
  updateStats();
}

checkFirst();
</script>

</body>
</html>
