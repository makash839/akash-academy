<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akash Academy AI Dashboard</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #0f172a;
            --darker: #020617;
            --card: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, var(--darker) 0%, var(--dark) 100%);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* Loading Screen */
        #loader {
            position: fixed;
            inset: 0;
            background: var(--darker);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.3s;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Header */
        header {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            -webkit-text-fill-color: white;
        }

        .user-section {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .login-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(99, 102, 241, 0.1);
            padding: 6px 16px;
            border-radius: 50px;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid var(--primary);
        }

        .user-info {
            line-height: 1.2;
        }

        .user-name {
            font-weight: 600;
            font-size: 0.85rem;
        }

        .user-email {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .logout-btn {
            background: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: var(--danger);
            color: white;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        .welcome {
            margin-bottom: 1.5rem;
        }

        .welcome h1 {
            font-size: 1.75rem;
            margin-bottom: 0.25rem;
        }

        .welcome p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.25rem;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }

        .stat-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            margin-bottom: 0.75rem;
        }

        .stat-icon.purple { background: rgba(99, 102, 241, 0.2); }
        .stat-icon.green { background: rgba(16, 185, 129, 0.2); }
        .stat-icon.orange { background: rgba(245, 158, 11, 0.2); }
        .stat-icon.red { background: rgba(239, 68, 68, 0.2); }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1.5rem;
        }

        @media (max-width: 1024px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.25rem;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-action {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .card-action:hover {
            background: var(--primary);
            color: white;
        }

        .card-action:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .heatmap {
            display: grid;
            grid-template-columns: repeat(14, 1fr);
            gap: 3px;
            margin-top: 0.75rem;
        }

        .heat-cell {
            aspect-ratio: 1;
            background: var(--border);
            border-radius: 3px;
            min-height: 12px;
        }

        .heat-cell.active {
            background: var(--success);
            box-shadow: 0 0 6px rgba(16, 185, 129, 0.4);
        }

        .exam-input {
            width: 100%;
            background: var(--dark);
            border: 1px solid var(--border);
            color: white;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 0.95rem;
            margin-bottom: 0.75rem;
        }

        .exam-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .countdown {
            text-align: center;
            padding: 1.5rem;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(139, 92, 246, 0.1));
            border-radius: 12px;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }

        .countdown-number {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .countdown-label {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .ai-box {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 12px;
            padding: 1rem;
            margin-top: 0.75rem;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .subject-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-top: 0.75rem;
        }

        .subject-item {
            background: var(--dark);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .subject-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            cursor: pointer;
        }

        .subject-title {
            font-weight: 600;
            font-size: 1rem;
        }

        .progress-bar {
            width: 80px;
            height: 5px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
            margin-right: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 3px;
            transition: width 0.3s;
        }

        .topic-list {
            padding: 0 1rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .topic-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0.6rem 0.75rem;
            background: var(--card);
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .topic-check {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid var(--border);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            flex-shrink: 0;
        }

        .topic-check:hover {
            border-color: var(--success);
        }

        .topic-check.done {
            background: var(--success);
            border-color: var(--success);
            color: white;
        }

        .topic-name.done {
            text-decoration: line-through;
            opacity: 0.6;
            color: var(--success);
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            width: 90%;
            max-width: 400px;
        }

        .modal-title {
            font-size: 1.25rem;
            margin-bottom: 1rem;
        }

        .modal-input {
            width: 100%;
            background: var(--dark);
            border: 1px solid var(--border);
            color: white;
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .modal-actions {
            display: flex;
            gap: 0.75rem;
            justify-content: flex-end;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-secondary {
            background: var(--border);
            color: white;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .toast {
            position: fixed;
            top: 90px;
            right: 20px;
            background: var(--card);
            border-left: 4px solid var(--success);
            padding: 1rem 1.5rem;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            z-index: 1001;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loader">
        <div class="spinner"></div>
        <p style="margin-top: 1rem; color: var(--text-muted);">Loading...</p>
    </div>

    <!-- Toast -->
    <div id="toastContainer"></div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h3 class="modal-title" id="modalTitle">Add</h3>
            <input type="text" class="modal-input" id="modalInput" placeholder="Enter...">
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="modalSubmit()">Add</button>
            </div>
        </div>
    </div>

    <!-- Header -->
    <header>
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">🎓</div>
                Akash Academy AI
            </div>
            
            <div class="user-section">
                <button class="login-btn" id="loginBtn" onclick="login()">
                    ☁️ Login
                </button>
                
                <div class="user-profile hidden" id="userProfile">
                    <img src="" class="user-avatar" id="userAvatar">
                    <div class="user-info">
                        <div class="user-name" id="userName">User</div>
                        <div class="user-email" id="userEmail">email</div>
                    </div>
                    <button class="logout-btn" onclick="logout()">Logout</button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <div class="container" id="mainContent" style="display: none;">
        
        <div class="welcome">
            <h1 id="welcomeText">Welcome! 👋</h1>
            <p>Track your progress and achieve your goals.</p>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon purple">📚</div>
                <div class="stat-value" id="statSubjects">0</div>
                <div class="stat-label">Subjects</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon green">✅</div>
                <div class="stat-value" id="statCompleted">0</div>
                <div class="stat-label">Completed</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon orange">🔥</div>
                <div class="stat-value" id="statStreak">0</div>
                <div class="stat-label">Streak</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon red">📅</div>
                <div class="stat-value" id="statDays">0</div>
                <div class="stat-label">Days Left</div>
            </div>
        </div>

        <div class="dashboard-grid">
            
            <!-- Left -->
            <div>
                <!-- Heatmap -->
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">📊 Study Heatmap</div>
                        <button class="card-action" id="studyBtn" onclick="markStudied()" disabled>
                            ✓ Studied Today
                        </button>
                    </div>
                    <div class="heatmap" id="heatmap"></div>
                </div>

                <!-- Subjects -->
                <div class="card" style="margin-top: 1rem;">
                    <div class="card-header">
                        <div class="card-title">📚 Subjects</div>
                        <button class="card-action" id="addSubjectBtn" onclick="addSubject()" disabled>
                            + Add
                        </button>
                    </div>
                    <div class="subject-list" id="subjectList">
                        <div class="empty-state">Login to add subjects</div>
                    </div>
                </div>
            </div>

            <!-- Right -->
            <div>
                <!-- Exam -->
                <div class="card">
                    <div class="card-title" style="margin-bottom: 0.75rem;">📅 Exam Date</div>
                    <input type="date" class="exam-input" id="examDate" onchange="setExam(this.value)">
                    <div class="countdown">
                        <div class="countdown-number" id="countNum">--</div>
                        <div class="countdown-label" id="countText">Set exam date</div>
                    </div>
                </div>

                <!-- AI -->
                <div class="card" style="margin-top: 1rem;">
                    <div class="card-title" style="margin-bottom: 0.75rem;">💡 AI Tip</div>
                    <div class="ai-box" id="aiTip">
                        Login for personalized study tips
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAm1EZtdULG_Qay6T0sO0k8D8dBfXpVMW4",
            authDomain: "akashacademy-33513.firebaseapp.com",
            projectId: "akashacademy-33513",
            storageBucket: "akashacademy-33513.appspot.com",
            messagingSenderId: "169097190637",
            appId: "1:169097190637:web:e8523bc099374a6955c0e4"
        };

        // State
        let auth, db, user = null;
        let data = { subjects: [], studyDates: [], exam: null };
        let modalCb = null;

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            // Load local data FIRST (fast)
            loadLocal();
            
            // Show UI immediately
            document.getElementById('loader').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            updateUI();

            // Then init Firebase (slow, in background)
            try {
                firebase.initializeApp(firebaseConfig);
                auth = firebase.auth();
                db = firebase.firestore();
                
                // Auth listener
                auth.onAuthStateChanged(u => {
                    user = u;
                    if (u) {
                        // Update UI for logged in user
                        document.getElementById('loginBtn').classList.add('hidden');
                        document.getElementById('userProfile').classList.remove('hidden');
                        document.getElementById('userName').textContent = u.displayName || 'User';
                        document.getElementById('userEmail').textContent = u.email;
                        document.getElementById('userAvatar').src = u.photoURL || '';
                        document.getElementById('welcomeText').textContent = `Hi ${u.displayName || 'there'}! 👋`;
                        
                        // Enable buttons
                        document.getElementById('studyBtn').disabled = false;
                        document.getElementById('addSubjectBtn').disabled = false;
                        
                        // Try to load cloud data (don't wait)
                        loadCloud(u.uid);
                    } else {
                        document.getElementById('loginBtn').classList.remove('hidden');
                        document.getElementById('userProfile').classList.add('hidden');
                        document.getElementById('welcomeText').textContent = 'Welcome! 👋';
                        document.getElementById('studyBtn').disabled = true;
                        document.getElementById('addSubjectBtn').disabled = true;
                    }
                    updateUI();
                });
                
            } catch(e) {
                console.log('Firebase init error:', e);
            }
        });

        // Auth
        function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(e => {
                showToast('Login failed: ' + e.message, 'error');
            });
        }

        function logout() {
            auth.signOut();
        }

        // Data functions
        function loadLocal() {
            const saved = localStorage.getItem('aa_data');
            if (saved) data = JSON.parse(saved);
        }

        function saveLocal() {
            localStorage.setItem('aa_data', JSON.stringify(data));
        }

        async function loadCloud(uid) {
            try {
                const doc = await db.collection('users').doc(uid).get();
                if (doc.exists && doc.data().data) {
                    // Merge: keep local if newer
                    const cloud = doc.data().data;
                    if (!data.lastUpdate || (cloud.lastUpdate && cloud.lastUpdate > data.lastUpdate)) {
                        data = cloud;
                        saveLocal();
                        updateUI();
                        showToast('Data synced!', 'success');
                    }
                } else {
                    // Save local to cloud
                    saveCloud();
                }
            } catch(e) {
                console.log('Cloud load failed:', e);
            }
        }

        function saveCloud() {
            if (!user || !db) return;
            data.lastUpdate = Date.now();
            db.collection('users').doc(user.uid).set({ data }).catch(() => {});
            saveLocal();
        }

        // Actions
        function markStudied() {
            const today = new Date().toISOString().slice(0,10);
            if (!data.studyDates.includes(today)) {
                data.studyDates.push(today);
                saveCloud();
                updateUI();
                showToast('Great job! ✅', 'success');
            } else {
                showToast('Already marked!', 'info');
            }
        }

        function setExam(date) {
            data.exam = date;
            saveCloud();
            updateUI();
            showToast('Exam date saved!', 'success');
        }

        function addSubject() {
            modalCb = name => {
                data.subjects.push({
                    id: Date.now(),
                    name: name,
                    topics: []
                });
                saveCloud();
                updateUI();
                showToast('Subject added!', 'success');
            };
            openModal('Add Subject', 'Subject name...');
        }

        function addTopic(sid) {
            modalCb = title => {
                const s = data.subjects.find(x => x.id === sid);
                if (s) {
                    s.topics.push({ title, done: false });
                    saveCloud();
                    updateUI();
                    showToast('Topic added!', 'success');
                }
            };
            openModal('Add Topic', 'Topic name...');
        }

        function toggleTopic(sid, idx) {
            const s = data.subjects.find(x => x.id === sid);
            if (s && s.topics[idx]) {
                s.topics[idx].done = !s.topics[idx].done;
                if (s.topics[idx].done) {
                    const today = new Date().toISOString().slice(0,10);
                    if (!data.studyDates.includes(today)) data.studyDates.push(today);
                }
                saveCloud();
                updateUI();
            }
        }

        function delSubject(sid) {
            if (!confirm('Delete?')) return;
            data.subjects = data.subjects.filter(x => x.id !== sid);
            saveCloud();
            updateUI();
        }

        // UI Update
        function updateUI() {
            // Stats
            const total = data.subjects.reduce((a,s) => a + s.topics.length, 0);
            const done = data.subjects.reduce((a,s) => a + s.topics.filter(t => t.done).length, 0);
            
            // Streak
            let streak = 0;
            for (let i = 0; i < 365; i++) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                if (data.studyDates.includes(d.toISOString().slice(0,10))) streak++;
                else if (i > 0) break;
            }
            
            // Days left
            let days = 0;
            if (data.exam) {
                days = Math.ceil((new Date(data.exam) - new Date()) / 86400000);
                if (days < 0) days = 0;
            }
            
            document.getElementById('statSubjects').textContent = data.subjects.length;
            document.getElementById('statCompleted').textContent = done;
            document.getElementById('statStreak').textContent = streak;
            document.getElementById('statDays').textContent = days;
            
            // Exam date input
            if (data.exam) document.getElementById('examDate').value = data.exam;
            
            // Countdown
            if (!data.exam) {
                document.getElementById('countNum').textContent = '--';
                document.getElementById('countText').textContent = 'Set exam date';
            } else {
                document.getElementById('countNum').textContent = days;
                document.getElementById('countText').textContent = days === 1 ? 'day left' : 'days left';
            }
            
            // Heatmap (last 98 days)
            const hm = document.getElementById('heatmap');
            hm.innerHTML = '';
            for (let i = 97; i >= 0; i--) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                const cell = document.createElement('div');
                cell.className = 'heat-cell';
                if (data.studyDates.includes(d.toISOString().slice(0,10))) {
                    cell.classList.add('active');
                }
                hm.appendChild(cell);
            }
            
            // Subjects
            const sl = document.getElementById('subjectList');
            if (data.subjects.length === 0) {
                sl.innerHTML = '<div class="empty-state">' + (user ? 'No subjects. Click Add!' : 'Login to add subjects') + '</div>';
            } else {
                sl.innerHTML = data.subjects.map(s => {
                    const totalT = s.topics.length;
                    const doneT = s.topics.filter(t => t.done).length;
                    const pct = totalT ? Math.round(doneT/totalT*100) : 0;
                    
                    return `
                        <div class="subject-item">
                            <div class="subject-header" onclick="toggleSub(${s.id})">
                                <div>
                                    <div class="subject-title">${s.name}</div>
                                    <div style="font-size: 0.8rem; color: var(--text-muted);">${doneT}/${totalT} done</div>
                                </div>
                                <div style="display: flex; align-items: center;">
                                    <div class="progress-bar">
                                        <div class="progress-fill" style="width: ${pct}%"></div>
                                    </div>
                                    <span style="font-size: 0.8rem; margin: 0 8px;">${pct}%</span>
                                    ${user ? `
                                        <button class="btn btn-primary" style="padding: 4px 10px; font-size: 0.75rem;" onclick="event.stopPropagation(); addTopic(${s.id})">+</button>
                                        <button class="btn btn-secondary" style="padding: 4px 10px; font-size: 0.75rem; margin-left: 4px;" onclick="event.stopPropagation(); delSubject(${s.id})">🗑</button>
                                    ` : ''}
                                </div>
                            </div>
                            <div class="topic-list" id="sub-${s.id}" style="display: none;">
                                ${s.topics.map((t,i) => `
                                    <div class="topic-item">
                                        <div class="topic-check ${t.done ? 'done' : ''}" onclick="toggleTopic(${s.id}, ${i})">${t.done ? '✓' : ''}</div>
                                        <span class="topic-name ${t.done ? 'done' : ''}">${t.title}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }).join('');
            }
            
            // AI Tip
            const remaining = total - done;
            let tip = '';
            if (!user) tip = 'Login for AI study tips!';
            else if (remaining === 0) tip = '🎉 All done! Great job!';
            else if (!data.exam) tip = `📚 ${remaining} topics left. Set exam date!`;
            else {
                const perDay = Math.ceil(remaining / (days || 1));
                tip = `📅 ${days} days left.<br>Study <b>${perDay}</b> topics/day to finish!`;
            }
            document.getElementById('aiTip').innerHTML = tip;
        }

        function toggleSub(id) {
            const el = document.getElementById('sub-' + id);
            el.style.display = el.style.display === 'none' ? 'flex' : 'none';
        }

        // Modal
        function openModal(title, ph) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalInput').placeholder = ph;
            document.getElementById('modalInput').value = '';
            document.getElementById('modal').classList.add('active');
            document.getElementById('modalInput').focus();
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            modalCb = null;
        }

        function modalSubmit() {
            const val = document.getElementById('modalInput').value.trim();
            if (val && modalCb) {
                modalCb(val);
                closeModal();
            }
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeModal();
            if (e.key === 'Enter' && document.getElementById('modal').classList.contains('active')) {
                modalSubmit();
            }
        });

        // Toast
        function showToast(msg, type = 'success') {
            const t = document.createElement('div');
            t.className = 'toast';
            t.style.borderLeftColor = type === 'error' ? 'var(--danger)' : type === 'info' ? 'var(--warning)' : 'var(--success)';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }
    </script>
</body>
</html>
