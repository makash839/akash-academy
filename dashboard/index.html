<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akash Academy AI - Smart Study Dashboard</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --dark: #0f172a;
            --darker: #020617;
            --card: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, var(--darker) 0%, var(--dark) 100%);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* Lock Screen */
        .lock-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, var(--darker) 0%, var(--dark) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .lock-content {
            background: var(--card);
            border: 2px solid var(--border);
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5);
        }

        .lock-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .lock-content h2 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .lock-content p {
            color: var(--text-muted);
            margin-bottom: 25px;
        }

        .lock-input {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: 2px solid var(--border);
            background: var(--dark);
            color: var(--text);
            font-size: 1.5rem;
            text-align: center;
            letter-spacing: 12px;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .lock-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
        }

        .lock-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .lock-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
        }

        .lock-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .lock-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 0.9rem;
            display: none;
        }

        .lockout-timer {
            color: var(--danger);
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 15px;
        }

        .lock-footer {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        /* Header */
        header {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 1.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: white;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .header-btn {
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid;
        }

        .lock-app-btn {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border-color: var(--danger);
        }

        .lock-app-btn:hover {
            background: var(--danger);
            color: white;
        }

        .reset-btn {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning);
            border-color: var(--warning);
        }

        .reset-btn:hover {
            background: var(--warning);
            color: black;
        }

        .exam-date-btn {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border-color: var(--success);
        }

        .exam-date-btn:hover {
            background: var(--success);
            color: white;
        }

        .login-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(99, 102, 241, 0.1);
            padding: 5px 14px;
            border-radius: 50px;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }

        .user-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid var(--primary);
        }

        .logout-btn {
            background: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            cursor: pointer;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.25rem;
        }

        .welcome {
            margin-bottom: 1.25rem;
        }

        .welcome h1 {
            font-size: 1.5rem;
            margin-bottom: 0.25rem;
        }

        .welcome p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* Exam Date Banner */
        .exam-banner {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.15), rgba(245, 158, 11, 0.15));
            border: 2px solid var(--danger);
            border-radius: 16px;
            padding: 1.25rem;
            margin-bottom: 1.25rem;
            text-align: center;
        }

        .exam-banner.set {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.15), rgba(59, 130, 246, 0.15));
            border-color: var(--success);
        }

        .exam-banner h3 {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            color: var(--danger);
        }

        .exam-banner.set h3 {
            color: var(--success);
        }

        .exam-countdown {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--danger), var(--warning));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0.5rem 0;
        }

        .exam-banner.set .exam-countdown {
            background: linear-gradient(135deg, var(--success), var(--info));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .exam-date-text {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 0.75rem;
            margin-bottom: 1.25rem;
        }

        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }

        .stat-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            margin: 0 auto 0.5rem;
        }

        .stat-icon.purple { background: rgba(99, 102, 241, 0.2); }
        .stat-icon.green { background: rgba(16, 185, 129, 0.2); }
        .stat-icon.orange { background: rgba(245, 158, 11, 0.2); }
        .stat-icon.red { background: rgba(239, 68, 68, 0.2); }
        .stat-icon.blue { background: rgba(59, 130, 246, 0.2); }

        .stat-value {
            font-size: 1.6rem;
            font-weight: 700;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.75rem;
        }

        .hidden { display: none !important; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 80px;
            right: 20px;
            background: var(--card);
            border-left: 4px solid var(--success);
            padding: 0.875rem 1.25rem;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            z-index: 1001;
            animation: slideIn 0.3s ease;
            max-width: 280px;
            font-size: 0.9rem;
        }

        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- 🔐 LOCK SCREEN -->
    <div class="lock-screen" id="lockScreen">
        <div class="lock-content">
            <div class="lock-icon">🔐</div>
            <h2>Akash Academy AI</h2>
            <p>Enter 6-digit password</p>
            <input type="password" class="lock-input" id="lockPassword" maxlength="6" placeholder="••••••" inputmode="numeric">
            <button class="lock-btn" id="unlockBtn" onclick="unlockApp()">
                <span>🔓</span>
                <span>Unlock</span>
            </button>
            <div class="lock-error" id="lockError"></div>
            <div class="lockout-timer" id="lockoutTimer" style="display: none;"></div>
            <div class="lock-footer">⚠️ Password: 193434</div>
        </div>
    </div>

    <!-- Main App -->
    <div id="mainApp" class="hidden">
        <header>
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon">🎓</div>
                    Akash Academy AI
                </div>
                
                <div class="header-actions">
                    <button class="header-btn lock-app-btn" onclick="lockApp()">
                        <span>🔒</span>
                        <span>Lock</span>
                    </button>
                </div>
            </div>
        </header>

        <div class="container">
            <div class="welcome">
                <h1>Welcome! 👋</h1>
                <p>Smart Study Dashboard</p>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon purple">📚</div>
                    <div class="stat-value" id="statSubjects">0</div>
                    <div class="stat-label">Subjects</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon green">✅</div>
                    <div class="stat-value" id="statDone">0</div>
                    <div class="stat-label">Completed</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== FIXED PASSWORD ====================
        const MASTER_PASSWORD = "193434";
        
        let wrongAttempts = parseInt(localStorage.getItem("aa_wrongAttempts")) || 0;
        let lockoutUntil = parseInt(localStorage.getItem("aa_lockoutUntil")) || 0;

        // ==================== LOCK SYSTEM ====================
        function unlockApp() {
            const now = Date.now();
            
            // Check if locked out
            if (lockoutUntil > now) {
                showLockError(`🔒 Wait ${Math.ceil((lockoutUntil - now) / 1000)}s`);
                return;
            }
            
            const password = document.getElementById('lockPassword').value;
            
            if (password === MASTER_PASSWORD) {
                // ✅ CORRECT PASSWORD
                wrongAttempts = 0;
                localStorage.setItem("aa_wrongAttempts", "0");
                
                // Hide lock screen
                document.getElementById('lockScreen').style.display = 'none';
                
                // Show main app
                document.getElementById('mainApp').classList.remove('hidden');
                
                // Clear password
                document.getElementById('lockPassword').value = '';
                document.getElementById('lockError').style.display = 'none';
                
                showToast('✅ Unlocked Successfully!', 'success');
            } else {
                // ❌ WRONG PASSWORD
                wrongAttempts++;
                localStorage.setItem("aa_wrongAttempts", wrongAttempts.toString());
                document.getElementById('lockPassword').value = '';
                showLockError(`❌ Wrong! Attempt ${wrongAttempts}/5`);
                
                // Shake animation
                document.getElementById('lockPassword').style.animation = 'shake 0.5s';
                setTimeout(() => document.getElementById('lockPassword').style.animation = '', 500);
                
                // Lock after 5 wrong attempts
                if (wrongAttempts >= 5) {
                    lockoutUntil = Date.now() + 60000; // 60 seconds
                    localStorage.setItem("aa_lockoutUntil", lockoutUntil.toString());
                    wrongAttempts = 0;
                    localStorage.setItem("aa_wrongAttempts", "0");
                    startLockoutTimer();
                }
            }
        }

        function showLockError(msg) {
            const el = document.getElementById('lockError');
            el.textContent = msg;
            el.style.display = 'block';
        }

        function startLockoutTimer() {
            const timerEl = document.getElementById('lockoutTimer');
            const inputEl = document.getElementById('lockPassword');
            const btnEl = document.getElementById('unlockBtn');
            
            timerEl.style.display = 'block';
            inputEl.disabled = true;
            btnEl.disabled = true;
            document.getElementById('lockError').style.display = 'none';
            
            const interval = setInterval(() => {
                const now = Date.now();
                if (lockoutUntil <= now) {
                    clearInterval(interval);
                    timerEl.style.display = 'none';
                    inputEl.disabled = false;
                    btnEl.disabled = false;
                } else {
                    timerEl.textContent = `🔒 Locked for ${Math.ceil((lockoutUntil - now) / 1000)}s`;
                }
            }, 1000);
        }

        function lockApp() {
            document.getElementById('mainApp').classList.add('hidden');
            document.getElementById('lockScreen').style.display = 'flex';
            document.getElementById('lockPassword').value = '';
            document.getElementById('lockError').style.display = 'none';
        }

        // Enter key support
        document.getElementById('lockPassword').addEventListener('keypress', e => {
            if (e.key === 'Enter') unlockApp();
        });

        // Toast notification
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            toast.style.borderLeftColor = type === 'success' ? '#10b981' : '#ef4444';
            document.body.appendChild(toast);
            
            setTimeout(() => toast.remove(), 3000);
        }

        // Check if should show lockout timer on page load
        window.addEventListener('DOMContentLoaded', () => {
            const now = Date.now();
            if (lockoutUntil > now) {
                startLockoutTimer();
            }
        });
    </script>

</body>
</html>
