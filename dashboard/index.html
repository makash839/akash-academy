<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Akash Academy AI Dashboard</title>

<!-- Firebase COMPAT SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
padding:20px;
}
.card{
background:#111827;
padding:18px;
margin:10px;
border-radius:12px;
}
button{
background:#6366f1;
border:none;
padding:10px;
color:white;
border-radius:8px;
cursor:pointer;
}
#heatmap{
display:grid;
grid-template-columns:repeat(14,1fr);
gap:5px;
}
.box{
height:14px;
background:#1f2937;
border-radius:3px;
}
</style>
</head>

<body>

<h2>🧠 Akash Academy OMNISCIENT AI</h2>

<button onclick="login()">☁️ Google Login</button>

<div class="card">
<h3>📅 Exam Planner</h3>
<input type="date" onchange="setExam(this.value)">
<div id="days"></div>
</div>

<div class="card">
<h3>📊 Study Heatmap</h3>
<div id="heatmap"></div>
<button onclick="studied()">✅ I Studied Today</button>
</div>

<div class="card">
<h3>📚 Subjects</h3>
<button onclick="addSubject()">Add Subject</button>
<div id="subjects"></div>
</div>

<div class="card">
<h3>🌌 OMNISCIENT AI</h3>
<div id="ai"></div>
</div>

<script>

/* ================= DATA ================= */

const STORAGE="akash_ai";

let data={
subjects:[],
studyDates:[],
exam:null,
ai:{speed:1,intelligence:1}
};

function save(){
localStorage.setItem(STORAGE,JSON.stringify(data));

if(auth.currentUser){
db.collection("users")
.doc(auth.currentUser.uid)
.set({data});
}
}

function load(){
let s=localStorage.getItem(STORAGE);
if(s)data=JSON.parse(s);
}

/* ================= FIREBASE ================= */

const firebaseConfig={
apiKey:"AIzaSyAm1EZtdULG_Qay6T0sO0k8D8dBfXpVMW4",
authDomain:"akashacademy-33513.firebaseapp.com",
projectId:"akashacademy-33513",
storageBucket:"akashacademy-33513.appspot.com",
messagingSenderId:"169097190637",
appId:"1:169097190637:web:e8523bc099374a6955c0e4"
};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.firestore();

auth.onAuthStateChanged(async user=>{
if(!user)return;

let ref=db.collection("users").doc(user.uid);
let snap=await ref.get();

if(snap.exists){
data=snap.data().data;
render();
}else{
ref.set({data});
}
});

/* ================= LOGIN ================= */

async function login(){
const provider=
new firebase.auth.GoogleAuthProvider();

await auth.signInWithPopup(provider);
}

/* ================= STUDY ================= */

function today(){
return new Date().toISOString().slice(0,10);
}

function studied(){
let t=today();
if(!data.studyDates.includes(t))
data.studyDates.push(t);

learnAI();
save();
render();
}

/* ================= SUBJECT ================= */

function addSubject(){
let name=prompt("Subject?");
if(!name)return;

data.subjects.push({
id:Date.now(),
name,
topics:[]
});

save();
render();
}

function addTopic(id){
let s=data.subjects.find(x=>x.id==id);
let t=prompt("Topic?");
if(!t)return;

s.topics.push({title:t,done:false});
save();
render();
}

function finish(id,i){
let s=data.subjects.find(x=>x.id==id);
s.topics[i].done=true;

studied();
}

/* ================= AI ================= */

function learnAI(){

let total=0,done=0;

data.subjects.forEach(s=>{
s.topics.forEach(t=>{
total++;
if(t.done)done++;
});
});

data.ai.speed=(done/(data.studyDates.length||1)).toFixed(2);
data.ai.intelligence=(done/(total||1)*10).toFixed(2);
}

function omniscient(){

let remaining=0;

data.subjects.forEach(s=>{
remaining+=s.topics.filter(t=>!t.done).length;
});

let days=data.exam?
Math.ceil((new Date(data.exam)-new Date())/86400000):1;

return `Study ${Math.ceil(remaining/(days||1))} topics today`;
}

/* ================= UI ================= */

function setExam(v){
data.exam=v;
save();
render();
}

function heatmap(){
let el=document.getElementById("heatmap");
el.innerHTML="";

for(let i=180;i>=0;i--){
let d=new Date();
d.setDate(d.getDate()-i);
let ds=d.toISOString().slice(0,10);

let b=document.createElement("div");
b.className="box";

if(data.studyDates.includes(ds))
b.style.background="#10b981";

el.appendChild(b);
}
}

function renderSubjects(){

let el=document.getElementById("subjects");

el.innerHTML=data.subjects.map(s=>`
<div>
<b>${s.name}</b>
<button onclick="addTopic(${s.id})">+Topic</button>
<ul>
${s.topics.map((t,i)=>`
<li>
${t.title}
${t.done?"✅":
`<button onclick="finish(${s.id},${i})">Finish</button>`}
</li>`).join("")}
</ul>
</div>
`).join("");
}

function render(){

heatmap();
renderSubjects();

document.getElementById("ai")
.innerHTML=
`Speed: ${data.ai.speed}<br>
Intelligence: ${data.ai.intelligence}<br>
${omniscient()}`;
}

load();
render();

</script>
</body>
</html>
