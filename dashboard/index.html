<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Akash Academy – AI Study Dashboard</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6366f1">

<!-- Firebase (optional – fill config later) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
:root{--primary:#6366f1;--bg:#0f172a;--card:#111827;--text:#e5e7eb;--muted:#94a3b8;--border:#1f2937;}
*{box-sizing:border-box}
body{margin:0;font-family:Segoe UI,system-ui,Arial;background:linear-gradient(135deg,#0f172a,#020617);color:var(--text)}
.container{max-width:1200px;margin:auto;padding:24px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.title{font-size:28px;font-weight:800}
.btn{background:var(--primary);border:none;color:#fff;padding:10px 16px;border-radius:10px;cursor:pointer}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px}
.card h3{margin:0 0 12px 0}
input{padding:10px;border-radius:8px;border:1px solid var(--border);background:#020617;color:#fff}
#heatmap{display:grid;grid-template-columns:repeat(14,1fr);gap:6px}
.box{height:14px;border-radius:3px;background:#1f2937}
</style>
</head>
<body>
<div class="container">

<div class="header">
<div class="title">🎓 Akash Academy AI Dashboard</div>
<div>
<button class="btn" onclick="login()">☁️ Login</button>
</div>
</div>

<div class="grid">

<div class="card">
<h3>📅 Exam Planner</h3>
<input type="date" id="examDate" onchange="setExamDate(this.value)">
<div id="planner"></div>
</div>

<div class="card">
<h3>📊 Study Heatmap</h3>
<div id="heatmap"></div>
</div>

<div class="card">
<h3>🔥 Today Revisions</h3>
<div id="revisions">No revisions yet</div>
</div>

</div>
</div>

<script>
// =====================
// BASIC DATA ENGINE
// =====================
const STORAGE_KEY='akash_ai_dashboard_v1';
let data={subjects:[],studyDates:[],examDate:null};

function today(){return new Date().toISOString().slice(0,10)}

function load(){
 const s=localStorage.getItem(STORAGE_KEY);
 if(s) data={...data,...JSON.parse(s)};
}

function save(){
 localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
 if(window.auth && auth.currentUser){
   db.collection('users').doc(auth.currentUser.uid).set({data});
 }
}

// =====================
// FIREBASE LOGIN
// =====================
let auth,db;
try{
 const firebaseConfig={
  apiKey:"ADD_KEY",
  authDomain:"ADD_DOMAIN",
  projectId:"ADD_PROJECT"
 };
 firebase.initializeApp(firebaseConfig);
 auth=firebase.auth();
 db=firebase.firestore();

 auth.onAuthStateChanged(async user=>{
  if(!user) return;
  const ref=db.collection('users').doc(user.uid);
  const snap=await ref.get();
  if(snap.exists){data=snap.data().data;save();renderAll();}
  else await ref.set({data});
 });
}catch(e){console.log('Firebase not configured yet');}

async function login(){
 if(!auth) return alert('Add Firebase config first');
 const provider=new firebase.auth.GoogleAuthProvider();
 await auth.signInWithPopup(provider);
}

// =====================
// PLANNER
// =====================
function setExamDate(v){data.examDate=v;save();renderPlanner();}

function planner(){
 if(!data.examDate) return null;
 const days=Math.max(1,Math.ceil((new Date(data.examDate)-new Date())/86400000));
 return{days};
}

function renderPlanner(){
 const p=planner();
 const el=document.getElementById('planner');
 if(!p){el.innerHTML='Set exam date';return}
 el.innerHTML=`Days Left: <b>${p.days}</b>`;
}

// =====================
// HEATMAP
// =====================
function renderHeatmap(){
 const el=document.getElementById('heatmap');
 el.innerHTML='';
 const now=new Date();
 for(let i=180;i>=0;i--){
  const d=new Date(now);
  d.setDate(d.getDate()-i);
  const ds=d.toISOString().slice(0,10);
  const box=document.createElement('div');
  box.className='box';
  if(data.studyDates.includes(ds)) box.style.background='#10b981';
  el.appendChild(box);
 }
}

// =====================
// PWA SERVICE WORKER
// =====================
if('serviceWorker' in navigator){
 navigator.serviceWorker.register('/sw.js').catch(()=>{});
}

// =====================
// MAIN RENDER
// =====================
function renderAll(){
 renderPlanner();
 renderHeatmap();
}

window.onload=()=>{
 load();
 renderAll();
};
</script>
</body>
</html>
